name: Patch OnlyOffice for aarch64 Termux/Proot

on:
  schedule:
    - cron: '0 0 * * 1'  # Run every Monday to check for new releases
  workflow_dispatch:      # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Get latest OnlyOffice version and download URL
        id: get_version
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/ONLYOFFICE/DesktopEditors/releases/latest)
          VERSION=$(echo "$RELEASE" | jq -r '.tag_name' | tr -d 'v')
          URL="https://github.com/ONLYOFFICE/DesktopEditors/releases/latest/download/DesktopEditors-arm64.AppImage"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "URL: $URL"

      - name: Check if already patched
        id: check_release
        run: |
          TAG="v${{ steps.get_version.outputs.version }}-aarch64-patched"
          EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Status: $EXISTS"

      - name: Download OnlyOffice arm64 AppImage
        if: steps.check_release.outputs.exists != '200'
        run: |
          curl -L -o OnlyOffice.AppImage "${{ steps.get_version.outputs.url }}"
          file OnlyOffice.AppImage

      - name: Extract AppImage
        if: steps.check_release.outputs.exists != '200'
        run: |
          sudo apt-get install -y squashfs-tools
          # Find squashfs offset inside the AppImage
          OFFSET=$(python3 -c "
          with open('OnlyOffice.AppImage', 'rb') as f:
              data = f.read(1024)
          idx = data.find(b'hsqs')
          if idx == -1:
              idx = data.find(b'sqsh')
          print(idx)
          ")
          echo "Squashfs offset: $OFFSET"
          unsquashfs -o $OFFSET -d onlyoffice-extracted OnlyOffice.AppImage

      - name: Find and patch libQt5Gui.so.5
        if: steps.check_release.outputs.exists != '200'
        run: |
          LIB_PATH=$(find onlyoffice-extracted -name "libQt5Gui.so.5" | head -1)
          echo "Found lib at: $LIB_PATH"

          if [ -z "$LIB_PATH" ]; then
            echo "ERROR: libQt5Gui.so.5 not found!"
            exit 1
          fi

          python3 - "$LIB_PATH" <<'EOF'
          import sys

          path = sys.argv[1]
          print(f"Patching: {path}")

          with open(path, "r+b") as f:
              data = bytearray(f.read())

          found = False
          i = 0
          while i < len(data) - 8:
              if data[i:i+4] == b'\x51\xe5\x74\x64':  # PT_GNU_STACK
                  print(f"Found GNU_STACK at offset {i}")
                  flags_offset = i + 4
                  flags = int.from_bytes(data[flags_offset:flags_offset+4], 'little')
                  print(f"Current flags: {flags:#010x}")
                  flags &= ~0x1  # clear PF_X (executable bit)
                  data[flags_offset:flags_offset+4] = flags.to_bytes(4, 'little')
                  print(f"New flags:     {flags:#010x}")
                  found = True
                  break
              i += 1

          if not found:
              print("ERROR: GNU_STACK segment not found!")
              sys.exit(1)

          with open(path, "wb") as f:
              f.write(data)
          print("Patch applied successfully!")
          EOF

      - name: Repackage into AppImage
        if: steps.check_release.outputs.exists != '200'
        run: |
          # Download appimagetool for x86_64 (CI runner is x86_64)
          curl -L -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ./appimagetool.AppImage --appimage-extract
          mv squashfs-root appimagetool-extracted

          # Repackage — set arch to aarch64
          ARCH=aarch64 ./appimagetool-extracted/AppRun \
            onlyoffice-extracted \
            OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage

          echo "Repackaged successfully!"
          ls -lh *.AppImage

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != '200'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.check_release.outputs.tag }}
          name: OnlyOffice ${{ steps.get_version.outputs.version }} - aarch64 Patched
          body: |
            ## OnlyOffice Desktop ${{ steps.get_version.outputs.version }} — aarch64 Termux/Proot Patched

            Automatically patched build of OnlyOffice for **aarch64 Android** devices running Termux proot-distro or Tiny Computer.

            ### What was patched
            Cleared the executable stack flag (`PF_X`) on `libQt5Gui.so.5` to fix:
            ```
            libQt5Gui.so.5: cannot enable executable stack as shared object requires: Permission denied
            ```

            ### How to run (no FUSE / Termux / proot)
            ```bash
            ./OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage --appimage-extract
            cd squashfs-root
            ./AppRun
            ```

            ### How to run (normal Linux with FUSE)
            ```bash
            chmod +x OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage
            ./OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage
            ```
          files: OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if already released
        if: steps.check_release.outputs.exists == '200'
        run: echo "Release ${{ steps.check_release.outputs.tag }} already exists, skipping."
