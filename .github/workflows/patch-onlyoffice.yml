
name: Patch OnlyOffice for aarch64 Termux/Proot

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  patch-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Get latest OnlyOffice version
        id: get_version
        run: |
          RELEASE_JSON=$(curl -s https://api.github.com/repos/ONLYOFFICE/DesktopEditors/releases/latest)

          VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name' | sed 's/^v//')

          DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '
            .assets[]
            | select(.name=="onlyoffice-desktopeditors_arm64.deb")
            | .browser_download_url
          ')

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "ERROR: ARM64 package not found!"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

          echo "Detected version: $VERSION"
          echo "Download URL: $DOWNLOAD_URL"

      - name: Check if already patched
        id: check_release
        run: |
          TAG="v${{ steps.get_version.outputs.version }}-aarch64-patched"

          EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)

          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          echo "Release check status: $EXISTS"

      - name: Download OnlyOffice ARM64 deb
        if: steps.check_release.outputs.exists != '200'
        run: |
          curl -L \
            "${{ steps.get_version.outputs.download_url }}" \
            -o onlyoffice.deb

          ls -lh onlyoffice.deb

      - name: Extract deb
        if: steps.check_release.outputs.exists != '200'
        run: |
          mkdir -p onlyoffice-extracted
          dpkg-deb -x onlyoffice.deb onlyoffice-extracted/

      - name: Find and patch libQt5Gui.so.5
        if: steps.check_release.outputs.exists != '200'
        run: |
          LIB_PATH=$(find onlyoffice-extracted -name "libQt5Gui.so.5" | head -1)

          echo "Found lib at: $LIB_PATH"

          if [ -z "$LIB_PATH" ]; then
            echo "ERROR: libQt5Gui.so.5 not found!"
            exit 1
          fi

          python3 - "$LIB_PATH" <<'EOF'
          import sys

          path = sys.argv[1]
          print(f"Patching: {path}")

          with open(path, "r+b") as f:
              data = bytearray(f.read())

          found = False
          i = 0

          while i < len(data) - 8:
              if data[i:i+4] == b'\x51\xe5\x74\x64':
                  print(f"Found GNU_STACK at offset {i}")

                  flags_offset = i + 4
                  flags = int.from_bytes(
                      data[flags_offset:flags_offset+4],
                      "little"
                  )

                  print(f"Current flags: {flags:#010x}")

                  flags &= ~0x1

                  data[flags_offset:flags_offset+4] = (
                      flags.to_bytes(4, "little")
                  )

                  print(f"New flags: {flags:#010x}")

                  found = True
                  break

              i += 1

          if not found:
              print("ERROR: GNU_STACK segment not found!")
              sys.exit(1)

          with open(path, "wb") as f:
              f.write(data)

          print("Patch applied successfully!")
          EOF

      - name: Repack deb
        if: steps.check_release.outputs.exists != '200'
        run: |
          mkdir -p onlyoffice-extracted/DEBIAN

          dpkg-deb -e onlyoffice.deb \
            onlyoffice-extracted/DEBIAN/

          sed -i \
            's/^Package:.*/Package: onlyoffice-desktopeditors-aarch64-patched/' \
            onlyoffice-extracted/DEBIAN/control

          OUTPUT_FILE="onlyoffice-desktopeditors-${{ steps.get_version.outputs.version }}-aarch64-patched.deb"

          dpkg-deb -b \
            onlyoffice-extracted \
            "$OUTPUT_FILE"

          echo "output_file=$OUTPUT_FILE" >> $GITHUB_ENV

          ls -lh "$OUTPUT_FILE"

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != '200'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.check_release.outputs.tag }}
          name: OnlyOffice ${{ steps.get_version.outputs.version }} - aarch64 Patched
          body: |
            ## OnlyOffice Desktop ${{ steps.get_version.outputs.version }} — aarch64 Termux/Proot Patched

            Automatically patched build of OnlyOffice for aarch64 Android devices running Termux proot-distro or Tiny Computer.

            ### What was patched

            Cleared the executable stack flag (`PF_X`) on `libQt5Gui.so.5` to fix:

            ```text
            libQt5Gui.so.5: cannot enable executable stack as shared object requires: Permission denied
            ```

            ### Install

            ```bash
            dpkg -i onlyoffice-desktopeditors-${{ steps.get_version.outputs.version }}-aarch64-patched.deb
            ```

            ### Run

            ```bash
            onlyoffice-desktopeditors
            ```
          files: onlyoffice-desktopeditors-${{ steps.get_version.outputs.version }}-aarch64-patched.deb
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if already released
        if: steps.check_release.outputs.exists == '200'
        run: |
          echo "Release ${{ steps.check_release.outputs.tag }} already exists, skipping."

