name: Patch OnlyOffice for aarch64 Termux/Proot

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  patch-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Get latest OnlyOffice version
        id: get_version
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/ONLYOFFICE/DesktopEditors/releases/latest)
          VERSION=$(echo "$RELEASE" | jq -r '.tag_name' | tr -d 'v')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if already patched
        id: check_release
        run: |
          TAG="v${{ steps.get_version.outputs.version }}-aarch64-patched"
          EXISTS=$(curl -s -o /dev/null -w "%{http_code}"             -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"             https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG)
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: steps.check_release.outputs.exists != '200'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download OnlyOffice arm64 AppImage
        if: steps.check_release.outputs.exists != '200'
        run: |
          curl -L -o OnlyOffice.AppImage             "https://github.com/ONLYOFFICE/DesktopEditors/releases/latest/download/DesktopEditors-arm64.AppImage"
          file OnlyOffice.AppImage

      - name: Extract, patch and repackage inside aarch64 container
        if: steps.check_release.outputs.exists != '200'
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          PATCH_SCRIPT: ""
        run: |
          docker run --rm --platform linux/arm64             -v "$PWD:/work"             -w /work             -e VERSION="$VERSION"             -e PATCH_SCRIPT="$PATCH_SCRIPT"             arm64v8/debian:bookworm             bash -exc '
              apt-get update -qq
              apt-get install -y -qq python3 wget

              echo "--- Extracting AppImage ---"
              chmod +x OnlyOffice.AppImage
              ./OnlyOffice.AppImage --appimage-extract
              mv squashfs-root onlyoffice-patched

              echo "--- Patching libQt5Gui.so.5 ---"
              LIB=$(find onlyoffice-patched -name "libQt5Gui.so.5" | head -1)
              echo "Found: $LIB"
              echo "$PATCH_SCRIPT" | base64 -d > patch.py
              python3 patch.py "$LIB"

              echo "--- Downloading appimagetool ---"
              wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage
              chmod +x appimagetool-aarch64.AppImage
              ./appimagetool-aarch64.AppImage --appimage-extract
              mv squashfs-root appimagetool-extracted

              echo "--- Repackaging ---"
              ./appimagetool-extracted/AppRun onlyoffice-patched OnlyOffice-${VERSION}-aarch64-patched.AppImage
              ls -lh OnlyOffice-${VERSION}-aarch64-patched.AppImage
            '

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != '200'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.check_release.outputs.tag }}
          name: OnlyOffice ${{ steps.get_version.outputs.version }} - aarch64 Patched
          body: |
            ## OnlyOffice Desktop ${{ steps.get_version.outputs.version }} — aarch64 Termux/Proot Patched

            Automatically patched build of OnlyOffice for **aarch64 Android** devices running Termux proot-distro or Tiny Computer.

            ### What was patched
            Cleared the executable stack flag on `libQt5Gui.so.5` to fix:
            ```
            libQt5Gui.so.5: cannot enable executable stack as shared object requires: Permission denied
            ```

            ### How to run (Termux / proot / no FUSE)
            ```bash
            ./OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage --appimage-extract
            cd squashfs-root
            ./AppRun
            ```

            ### How to run (normal Linux with FUSE)
            ```bash
            chmod +x OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage
            ./OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage
            ```
          files: OnlyOffice-${{ steps.get_version.outputs.version }}-aarch64-patched.AppImage
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if already released
        if: steps.check_release.outputs.exists == '200'
        run: echo "Release ${{ steps.check_release.outputs.tag }} already exists, skipping."
